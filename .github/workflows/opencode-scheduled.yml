name: Scheduled Run Lighthouse

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  lhci:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 20
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: npm install, build
        working-directory: frontend
        run: |
          npm install
          npm run build
      - name: run Lighthouse CI
        working-directory: frontend
        run: |
          npm install @lhci/cli@0.15.x
          npx lhci autorun
      - name: Ensure .lighthouseci is in frontend
        if: always()
        run: |
          if [ -d .lighthouseci ] && [ ! -d frontend/.lighthouseci ]; then
            echo "Moving .lighthouseci from root to frontend/"
            mv .lighthouseci frontend/.lighthouseci
          fi
      - name: Debug – check .lighthouseci
        if: always()
        working-directory: frontend
        run: |
          if [ -d .lighthouseci ]; then
            echo "found .lighthouseci/"
            ls -la .lighthouseci/
          else
            echo "NO .lighthouseci/ directory"
            ls -la
          fi
      - name: Save Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          overwrite: true