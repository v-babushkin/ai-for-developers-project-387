name: Scheduled Run Lighthouse

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  lhci:
    name: Lighthouse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 20
      - name: Use Node.js 24.x
        uses: actions/setup-node@v7
        with:
          node-version: 24.x
      - name: npm install, build
        working-directory: frontend
        run: |
          npm install
          npm run build
      - name: run Lighthouse CI
        working-directory: frontend
        run: |
          npm install @lhci/cli@0.15.x
          npx lhci autorun
      - name: Debug – check .lighthouseci
        if: always()
        working-directory: frontend
        run: |
          if [ -d .lighthouseci ]; then
            echo "found .lighthouseci/"
            ls -la .lighthouseci/
          else
            echo "NO .lighthouseci/ directory"
            ls -la
          fi
      - name: Save Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: frontend/.lighthouseci/
          overwrite: true